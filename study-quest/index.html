<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Study Quest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>

    <header>
      <div class="header-inner">
        <div class="brand">
          <h1>STUDY<span class="accent">QUEST</span></h1>
          <p class="tagline">Level up your learning.</p>
        </div>
        <div class="xp-panel">
          <div class="level-badge">LVL <span id="level-display">1</span></div>
          <div class="xp-track">
            <div class="xp-labels">
              <span>XP: <strong id="xp-display">0</strong></span>
              <span id="xp-next-label">/ 100 to next level</span>
            </div>
            <div class="xp-bar-bg">
              <div class="xp-bar-fill" id="xp-bar"></div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main>

      <!-- Left Column -->
      <aside class="sidebar">

        <!-- Add Subject -->
        <section class="panel">
          <h2 class="panel-title">Add Subject</h2>
          <form id="subject-form">
            <div class="field">
              <label for="subject-name">Subject Name</label>
              <input type="text" id="subject-name" placeholder="e.g. Calculus" maxlength="30" required />
            </div>
            <div class="field">
              <label for="subject-color">Color</label>
              <input type="color" id="subject-color" value="#7c6aff" />
            </div>
            <button type="submit" class="btn-primary">Add Subject</button>
          </form>
        </section>

        <!-- Subject List -->
        <section class="panel">
          <h2 class="panel-title">My Subjects</h2>
          <ul id="subject-list"></ul>
        </section>

      </aside>

      <!-- Right Column -->
      <div class="main-col">

        <!-- Log Session -->
        <section class="panel">
          <h2 class="panel-title">Log a Study Session</h2>
          <form id="session-form">
            <div class="field-row">
              <div class="field">
                <label for="session-subject">Subject</label>
                <select id="session-subject" required>
                  <option value="">— Pick a subject —</option>
                </select>
              </div>
              <div class="field">
                <label for="session-minutes">Minutes Studied</label>
                <input type="number" id="session-minutes" min="1" max="480" placeholder="e.g. 45" required />
              </div>
            </div>
            <div class="field">
              <label for="session-note">Note (optional)</label>
              <input type="text" id="session-note" placeholder="What did you work on?" maxlength="80" />
            </div>
            <button type="submit" class="btn-primary">Log Session +XP</button>
          </form>
        </section>

        <!-- Session History -->
        <section class="panel">
          <div class="history-header">
            <h2 class="panel-title">Session History</h2>
            <select id="history-filter">
              <option value="all">All Subjects</option>
            </select>
          </div>
          <div id="session-list"></div>
        </section>

      </div>

    </main>

  </body>
</html>
