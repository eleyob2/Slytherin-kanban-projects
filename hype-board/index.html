<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hype Board</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <header>
      <div class="header-inner">
        <h1>HYPE<span class="accent">BOARD</span></h1>
        <p class="tagline">Drop your hype. Spread the energy.</p>
      </div>
    </header>

    <main>

      <!-- Post Form -->
      <section class="form-panel">
        <h2 class="section-title">Drop Your Hype</h2>
        <form id="hype-form">
          <div class="field-group">
            <label for="author-input">Your Name</label>
            <input
              type="text"
              id="author-input"
              placeholder="e.g. Jordan S."
              maxlength="30"
              required
            />
          </div>
          <div class="field-group">
            <label for="hype-input">Your Message</label>
            <textarea
              id="hype-input"
              placeholder="Say something hype..."
              maxlength="150"
              required
            ></textarea>
          </div>
          <div class="form-footer">
            <select id="category-input">
              <option value="motivation">💪 Motivation</option>
              <option value="sports">🏆 Sports</option>
              <option value="academics">📚 Academics</option>
              <option value="life">✨ Life</option>
            </select>
            <button type="submit">Post It!</button>
          </div>
        </form>
      </section>

      <!-- Board -->
      <section class="board-panel">
        <div class="board-header">
          <h2 class="section-title">The Board</h2>
          <select id="filter-select">
            <option value="all">All Posts</option>
            <option value="motivation">💪 Motivation</option>
            <option value="sports">🏆 Sports</option>
            <option value="academics">📚 Academics</option>
            <option value="life">✨ Life</option>
          </select>
        </div>
        <div id="cards-container"></div>
      </section>

    </main>

    <script src="script.js"></script>
  </body>
</html>
